name: Deploy to VPS

# Auto-deploy on every push to master, or run manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH in, pull latest, rebuild, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          # The VPS is shared/loaded, so the Next.js build can be slow. Raise the
          # command timeout well above appleboy's 10-minute default so the build
          # + restart isn't killed mid-way (which would skip pm2 restart).
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR || '/var/www/Dr-Saab-AI' }}"

            # Get the exact pushed commit (discards stray edits on the server;
            # gitignored files like bot/.env and .env.production are untouched).
            git fetch --all --prune
            git reset --hard origin/master

            # Bot first — it's the critical path and needs no build, so restart
            # it up front. A slow website build can't block the bot going live.
            ( cd bot && npm install --omit=dev )
            pm2 restart drsaab-bot --update-env

            # Website (Next.js) — rebuild so the /bot page + admin reflect changes,
            # then restart it. This is the slow part; it runs after the bot is up.
            npm install --include=dev
            npm run build
            pm2 restart drsaab-web --update-env

            pm2 save
            echo "Deployed $(git rev-parse --short HEAD)"
